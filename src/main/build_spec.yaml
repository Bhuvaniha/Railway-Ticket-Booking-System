version: 0.1
component: build
timeoutInSeconds: 600
shell: bash

env:
  variables:
    NODE_ENV: "production"

phases:
  install:
    steps:
      - type: Command
        name: "Install Dependencies"
        command: |
          echo "Installing frontend dependencies..."
          npm install
          echo "Verifying Java/Maven environment..."
          mvn -version

  build:
    steps:
      - type: Command
        name: "Build React Frontend"
        command: |
          npm run build

      - type: Command
        name: "Build Java Backend"
        command: |
          # Compiles code and creates the JAR file in /target
          mvn clean package -DskipTests

  post_build:
    steps:
      - type: Command
        name: "Build Cleanup"
        command: |
          echo "Build completed successfully on `date`"

outputArtifacts:
  - name: java_app_binary
    type: BINARY
    location: target/*.jar
