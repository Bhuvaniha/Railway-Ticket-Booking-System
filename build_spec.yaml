version: 0.1
component: build
timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: "Install Java & Maven"
    command: |
      yum update -y
      yum install -y java-17-openjdk maven

      java -version
      mvn -version

  - type: Command
    name: "Build Project"
    command: |
      mvn clean install
