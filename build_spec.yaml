version: 0.1
component: build
timeoutInSeconds: 600
shell: bash

env:
  variables:
    NODE_ENV: "production"

steps:
  - type: Command
    name: "Install Frontend Dependencies"
    command: |
      echo "Installing frontend dependencies..."
      npm install

  - type: Command
    name: "Verify Java/Maven Environment"
    command: |
      echo "Verifying Java/Maven environment..."
      mvn -version

  - type: Command
    name: "Build React Frontend"
    command: |
      npm run build

  - type: Command
    name: "Build Java Backend"
    command: |
      echo "Building Java backend..."
      mvn clean package -DskipTests

  - type: Command
    name: "Build Cleanup"
    command: |
      echo "Build completed successfully on $(date)"

outputArtifacts:
  - name: java_app_binary
    type: BINARY
    location: target/*.jar
